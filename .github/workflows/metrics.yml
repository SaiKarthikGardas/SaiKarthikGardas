name: metrics
on:
  schedule: [{cron: "0 * * * *"}]   # hourly
  workflow_dispatch:
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 15
