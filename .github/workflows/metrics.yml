name: metrics
on:
  schedule: [{cron: "0 * * * *"}]   # every hour
  workflow_dispatch:
jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: metrics.stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          base: header, activity
          plugin_languages: yes
          plugin_languages_limit: 8
