name: Refresh README Stats Cache

on:
  schedule:
    - cron: "0 */3 * * *"   # every 3 hours
  workflow_dispatch:         # lets you click "Run workflow" manually too

permissions:
  contents: write

jobs:
  bump-timestamp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Bump cache-busting timestamp in README
        run: |
          TS=$(date -u +"%Y%m%d%H%M")
          sed -i -E "s/(t=)[0-9]{12}/\1${TS}/g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh stats cache"
          git push
